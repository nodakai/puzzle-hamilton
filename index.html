<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkpoint Trail</title>
    <meta
      name="description"
      content="Create printable trail puzzles directly in the browser."
    >
    <style>
:root {
  --app-bg: #ede6d8;
  --panel-bg: #fbf6ec;
  --panel-border: #d9c7aa;
  --panel-shadow: rgba(61, 45, 24, 0.08);
  --text: #22201b;
  --muted: #6a6458;
  --accent: #8d5b1f;
  --accent-soft: #f2e2bf;
  --page-edge: #d8d8d8;
  --field-bg: #fffdf8;
  --field-border: #cdbda0;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(255, 242, 215, 0.9), transparent 28%),
    linear-gradient(180deg, #f4efe5 0%, var(--app-bg) 100%);
  font-family: "Avenir Next", "Trebuchet MS", sans-serif;
}

button,
input,
select {
  font: inherit;
}

.app-shell {
  display: grid;
  grid-template-columns: 21rem minmax(0, 1fr);
  min-height: 100vh;
}

.control-panel {
  position: sticky;
  top: 0;
  align-self: start;
  height: 100vh;
  overflow: auto;
  padding: 1.6rem;
  border-right: 1px solid var(--panel-border);
  background: rgba(251, 246, 236, 0.92);
  box-shadow: 0 0 30px var(--panel-shadow);
  backdrop-filter: blur(10px);
}

.panel-head h1,
.preview-head h2 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 700;
  letter-spacing: -0.03em;
}

.panel-head h1 {
  font-size: clamp(2rem, 4vw, 2.8rem);
}

.preview-head h2 {
  font-size: clamp(1.8rem, 3vw, 2.4rem);
}

.kicker {
  margin: 0 0 0.35rem;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}

.lede,
.preview-note {
  margin: 0.55rem 0 0;
  color: var(--muted);
  line-height: 1.45;
}

.control-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-top: 1.5rem;
}

.control-group {
  padding: 1rem;
  border: 1px solid var(--panel-border);
  border-radius: 1rem;
  background: rgba(255, 253, 248, 0.88);
}

.control-group h2 {
  margin: 0 0 0.9rem;
  font-size: 1rem;
}

.field,
.checkbox {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.field span,
.checkbox span {
  font-size: 0.88rem;
  color: var(--muted);
}

.field input,
.field select {
  width: 100%;
  padding: 0.72rem 0.78rem;
  border: 1px solid var(--field-border);
  border-radius: 0.8rem;
  background: var(--field-bg);
  color: var(--text);
}

.field-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0.75rem;
}

.toggle-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 0.85rem;
}

.pill {
  position: relative;
  flex: 1;
}

.pill input {
  position: absolute;
  inset: 0;
  opacity: 0;
}

.pill span {
  display: block;
  padding: 0.7rem 0.8rem;
  border: 1px solid var(--field-border);
  border-radius: 999px;
  text-align: center;
  background: var(--field-bg);
}

.pill input:checked + span {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.checkbox {
  flex-direction: row;
  align-items: center;
  gap: 0.65rem;
}

.checkbox input {
  width: 1rem;
  height: 1rem;
}

.button-row {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
}

button {
  border: 0;
  border-radius: 999px;
  padding: 0.85rem 1.1rem;
  cursor: pointer;
}

button.primary {
  color: #fffaf2;
  background: linear-gradient(135deg, #7f4d14 0%, #a66d28 100%);
}

button.secondary {
  color: var(--text);
  background: #efe5d2;
}

.status-card {
  margin-top: 1rem;
  padding: 1rem;
  border-radius: 1rem;
  border: 1px solid var(--panel-border);
  background: rgba(242, 226, 191, 0.55);
}

.locale-bar {
  margin-top: 1rem;
}

.status-label,
.status-sub {
  margin: 0;
  color: var(--muted);
}

.status-main {
  margin: 0.25rem 0;
  font-size: 1.2rem;
  font-weight: 700;
}

.preview-stage {
  padding: 1.6rem;
}

.preview-head {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  align-items: end;
  margin-bottom: 1rem;
}

.pages-root {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.sheet {
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto;
  padding: 16mm 15mm 20mm;
  background: white;
  box-shadow: 0 18px 40px rgba(42, 32, 18, 0.12);
  display: flex;
  flex-direction: column;
  gap: 8mm;
}

.sheet-header {
  display: flex;
  flex-direction: column;
  gap: 1.5mm;
}

.sheet-title-row {
  display: flex;
  justify-content: space-between;
  gap: 8mm;
  align-items: start;
}

.sheet-header h3 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 24pt;
  line-height: 1.02;
}

.sheet-subtitle,
.sheet-pack {
  margin: 0;
  font-size: 11pt;
  line-height: 1.4;
}

.sheet-pack {
  padding: 3mm 4mm;
  border: 0.5mm solid rgba(58, 58, 58, 0.4);
  border-radius: 4mm;
  font-weight: 600;
  white-space: nowrap;
  color: rgba(31, 32, 27, 0.5);
  font-size: 7.7pt;
  line-height: 1;
}

.sheet-grid {
  display: grid;
  gap: 6mm;
  grid-template-columns: repeat(var(--columns, 1), minmax(0, 1fr));
  align-content: start;
}

.puzzle-card {
  display: flex;
  flex-direction: column;
  gap: 4mm;
  min-width: 0;
  align-items: start;
}

.puzzle-title {
  margin: 0;
  font-size: 15pt;
  font-family: Georgia, "Times New Roman", serif;
}

.board {
  position: relative;
  display: grid;
  width: fit-content;
  border: 0.8mm solid #505050;
  background: #ffffff;
  overflow: hidden;
}

.cell {
  position: relative;
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: min(18pt, calc(var(--cell) * 0.48));
  background: transparent;
  z-index: 1;
}

.label {
  width: min(1cm, calc(var(--cell) * 0.56));
  height: min(1cm, calc(var(--cell) * 0.56));
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: #ffffff;
  border: 0.45mm solid #2f2f2f;
  color: #2f2f2f;
  z-index: 4;
  line-height: 1;
}

.label.endpoint {
  min-width: min(1.34cm, calc(var(--cell) * 0.76));
  width: auto;
  height: min(1.08cm, calc(var(--cell) * 0.62));
  padding: 0 0.22em;
  background: #ffffff;
  border: 0.55mm solid #000000;
  color: #000000;
  border-radius: 0.42cm;
  box-shadow: 0 0 0 0.14mm #8a8a8a;
  font-size: 0.94em;
  font-weight: 700;
  text-align: center;
  justify-content: center;
}

.label.endpoint.solution-endpoint {
  border-width: 1.05mm;
  box-shadow: none;
}

.grid-layer,
.path-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.grid-layer {
  z-index: 2;
}

.path-layer {
  z-index: 3;
}

.sheet-footer {
  display: flex;
  justify-content: start;
  align-items: end;
  margin-top: auto;
}

.legend {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4mm 8mm;
  max-width: 178mm;
}

.legend-card {
  padding: 4mm 4.5mm;
  border: 0.5mm solid #d8d8d8;
  border-radius: 5mm;
  background: #ffffff;
}

.legend-card strong {
  display: block;
  margin-bottom: 1.5mm;
  font-size: 11pt;
}

.error-card {
  width: min(42rem, 100%);
  margin: 3rem auto;
  padding: 1.5rem;
  border-radius: 1rem;
  background: #fff7f5;
  border: 1px solid #e0b4a6;
}

@media (max-width: 1100px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .control-panel {
    position: static;
    height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--panel-border);
  }

  .preview-head {
    flex-direction: column;
    align-items: start;
  }
}

@media print {
  body {
    background: white;
  }

  .control-panel,
  .preview-head {
    display: none !important;
  }

  .preview-stage {
    padding: 0;
  }

  .pages-root {
    gap: 0;
  }

    .sheet {
      height: 297mm;
      box-shadow: none;
      margin: 0;
      break-inside: avoid;
      page-break-inside: avoid;
      page-break-after: always;
      overflow: hidden;
      padding-bottom: 35mm;
    }

  .sheet:last-child {
    page-break-after: auto;
  }

  .sheet-header,
  .sheet-subtitle,
  .sheet-grid,
  .puzzle-card,
  .board {
    break-inside: avoid;
    page-break-inside: avoid;
  }
}
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel">
        <div class="panel-head">
          <h1 data-i18n="appTitle">Checkpoint Trail</h1>
          <p class="lede">
            <span data-i18n="appLead">Create printable trail puzzles right in your browser.</span>
          </p>
        </div>

        <form id="generator-form" class="control-form">
          <section class="control-group">
            <h2 data-i18n="bundleSection">Bundle</h2>
            <label class="field">
              <span data-i18n="bundleId">Bundle ID</span>
              <input id="bundle" name="bundle" inputmode="numeric" pattern="[0-9]*" required>
            </label>
            <div class="button-row">
              <button type="button" class="secondary" id="bundle-now" data-i18n="useCurrentTime">Use Current Time</button>
            </div>
          </section>

          <section class="control-group">
            <h2 data-i18n="boardSection">Board</h2>
            <div class="toggle-row">
              <label class="pill">
                <input type="radio" name="shape" value="square" checked>
                <span data-i18n="square">Square</span>
              </label>
              <label class="pill">
                <input type="radio" name="shape" value="rectangle">
                <span data-i18n="rectangle">Rectangle</span>
              </label>
            </div>

            <div id="square-fields">
              <label class="field">
                <span data-i18n="size">Size</span>
                <input id="size" name="size" type="number" min="2" max="12" value="6">
              </label>
            </div>

            <div id="rectangle-fields" hidden>
              <div class="field-grid">
                <label class="field">
                  <span data-i18n="width">Width</span>
                  <input id="width" name="width" type="number" min="2" max="12" value="6">
                </label>
                <label class="field">
                  <span data-i18n="height">Height</span>
                  <input id="height" name="height" type="number" min="2" max="12" value="8">
                </label>
              </div>
            </div>

            <div class="field-grid">
              <label class="field">
                <span data-i18n="checkpoints">Checkpoints</span>
                <input id="checkpoints" name="checkpoints" type="number" min="2" max="144" value="10">
              </label>
              <label class="field">
                <span data-i18n="mode">Mode</span>
                <select id="mode" name="mode">
                  <option value="path" data-i18n="path">Path</option>
                  <option value="circuit" data-i18n="circuit">Circuit</option>
                </select>
              </label>
            </div>
          </section>

          <section class="control-group">
            <h2 data-i18n="sheetsSection">Sheets</h2>
            <div class="field-grid">
              <label class="field">
                <span data-i18n="games">Games</span>
                <input id="games" name="games" type="number" min="1" max="24" value="2">
              </label>
              <label class="field">
                <span data-i18n="packPerPage">Games Per Page</span>
                <input id="pack" name="pack" type="number" min="1" max="6" value="2">
              </label>
            </div>
          </section>

          <div class="button-row">
            <button type="submit" class="primary" data-i18n="generateSheets">Generate Sheets</button>
            <button type="button" class="secondary" id="print-button" data-i18n="print">Print</button>
          </div>
        </form>

        <div class="status-card" id="status-card">
          <p class="status-label" data-i18n="currentSet">Print Summary</p>
          <p class="status-main" id="status-main">Ready</p>
          <p class="status-sub" id="status-sub">2 games, 2 per page</p>
        </div>

        <div class="locale-bar">
          <label class="field">
            <span data-i18n="language">Language</span>
            <select id="lang-select" data-i18n-aria-label="language" aria-label="Language">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="hi">हिन्दी</option>
              <option value="ar">العربية</option>
              <option value="id">Bahasa Indonesia</option>
              <option value="ja">日本語</option>
              <option value="tr">Türkçe</option>
              <option value="vi">Tiếng Việt</option>
              <option value="ko">한국어</option>
              <option value="fa">فارسی</option>
              <option value="sw">Kiswahili</option>
            </select>
          </label>
        </div>
      </aside>

      <main class="preview-stage">
        <div class="preview-head">
          <div>
            <p class="kicker" data-i18n="livePreview">Preview</p>
            <h2 data-i18n="printablePages">Printable Pages</h2>
          </div>
          <p class="preview-note" data-i18n="previewNote">Use your browser print dialog for final output.</p>
        </div>
        <div id="pages-root" class="pages-root"></div>
      </main>
    </div>

    <template id="error-template">
      <section class="error-card">
        <h2 data-i18n="cannotGenerate">Could not create pages</h2>
        <p id="error-message"></p>
      </section>
    </template>

    <script>
const CELL_LIMIT = 144;
const BUNDLE_BASE = 1000000000000n;
const GOLDEN_GAMMA = 0x9e3779b97f4a7c15n;
const MASK_64 = 0xffffffffffffffffn;

const form = document.querySelector("#generator-form");
const bundleInput = document.querySelector("#bundle");
const bundleNowButton = document.querySelector("#bundle-now");
const printButton = document.querySelector("#print-button");
const squareFields = document.querySelector("#square-fields");
const rectangleFields = document.querySelector("#rectangle-fields");
const statusMain = document.querySelector("#status-main");
const statusSub = document.querySelector("#status-sub");
const pagesRoot = document.querySelector("#pages-root");
const errorTemplate = document.querySelector("#error-template");
const langSelect = document.querySelector("#lang-select");
let currentLocale = "en";

function init() {
  const initialState = readStateFromUrl();
  langSelect.value = currentLocale;
  applyStaticTranslations();
  applyStateToForm(initialState);
  toggleShapeFields(initialState.shape);
  bindEvents();
  renderFromForm();
}

function bindEvents() {
  form.addEventListener("submit", (event) => {
    event.preventDefault();
    renderFromForm();
  });

  form.shape.forEach((input) => {
    input.addEventListener("change", () => toggleShapeFields(input.value));
  });

  bundleNowButton.addEventListener("click", () => {
    bundleInput.value = String(defaultBundle());
    renderFromForm();
  });

  printButton.addEventListener("click", () => window.print());

  langSelect.addEventListener("change", () => {
    currentLocale = langSelect.value;
    applyStaticTranslations();
    renderFromForm();
  });
}

function readStateFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return {
    bundle: params.get("bundle") ?? String(defaultBundle()),
    lang: params.get("lang") ?? "",
    shape: params.get("shape") === "rectangle" ? "rectangle" : "square",
    size: params.get("size") ?? "6",
    width: params.get("width") ?? "6",
    height: params.get("height") ?? "8",
    checkpoints: params.get("checkpoints") ?? "10",
    games: params.get("games") ?? "2",
    pack: params.get("pack") ?? "2",
    mode: params.get("mode") === "circuit" ? "circuit" : "path",
  };
}

function applyStateToForm(state) {
  bundleInput.value = state.bundle;
  form.shape.value = state.shape;
  form.size.value = state.size;
  form.width.value = state.width;
  form.height.value = state.height;
  form.checkpoints.value = state.checkpoints;
  form.games.value = state.games;
  form.pack.value = state.pack;
  form.mode.value = state.mode;
}

function toggleShapeFields(shape) {
  squareFields.hidden = shape !== "square";
  rectangleFields.hidden = shape !== "rectangle";
}

function renderFromForm() {
  try {
    const settings = readSettingsFromForm();
    syncUrl(settings);
    const puzzles = buildPuzzlePack(settings);
    const pages = renderPages(puzzles, settings);
    pagesRoot.innerHTML = pages;
    const totalPages = Math.ceil(settings.games / settings.pack) * 2;
    statusMain.textContent = tPlural("gamesReady", settings.games, { count: settings.games });
    statusSub.textContent = tPlural("pagesSummary", totalPages, { pack: settings.pack, count: totalPages });
  } catch (error) {
    renderError(error instanceof Error ? error.message : String(error));
  }
}

function readSettingsFromForm() {
  const shape = form.shape.value;
  const bundleText = bundleInput.value.trim();
  if (!/^\d+$/.test(bundleText)) {
    throw new Error(t("errorBundleDigits"));
  }

  const bundle = BigInt(bundleText);
  if (bundle < 0 || bundle >= BUNDLE_BASE) {
    throw new Error(t("errorBundleRange"));
  }

  const size = parseInteger(form.size.value, t("size"));
  const width = shape === "square" ? size : parseInteger(form.width.value, t("width"));
  const height = shape === "square" ? size : parseInteger(form.height.value, t("height"));
  const checkpoints = parseInteger(form.checkpoints.value, t("checkpoints"));
  const games = parseInteger(form.games.value, t("games"));
  const pack = parseInteger(form.pack.value, t("packPerPage"));
  const mode = form.mode.value;

  if (width < 2 || height < 2) {
    throw new Error(t("errorBoardMin"));
  }
  if (width * height > CELL_LIMIT) {
    throw new Error(t("errorBoardArea", { limit: CELL_LIMIT }));
  }
  if (mode === "circuit" && (width * height) % 2 !== 0) {
    throw new Error(t("errorCircuitEven"));
  }
  if (checkpoints < 2 || checkpoints > width * height) {
    throw new Error(t("errorCheckpointsFit"));
  }
  if (games < 1 || pack < 1) {
    throw new Error(t("errorGamesPackMin"));
  }

  return {
    bundle,
    bundleText,
    shape,
    width,
    height,
    checkpoints,
    games,
    pack,
    mode,
    instructions: instructionsForMode(mode, checkpoints),
  };
}

function parseInteger(value, label) {
  const parsed = Number.parseInt(value, 10);
  if (!Number.isFinite(parsed)) {
    throw new Error(t("errorWholeNumber", { label }));
  }
  return parsed;
}

function syncUrl(settings) {
  const params = new URLSearchParams({
    bundle: settings.bundleText,
    shape: settings.shape,
    size: String(settings.width),
    width: String(settings.width),
    height: String(settings.height),
    checkpoints: String(settings.checkpoints),
    games: String(settings.games),
    pack: String(settings.pack),
    mode: settings.mode,
  });
  params.set("lang", currentLocale);
  const finalUrl = `${window.location.pathname}?${params.toString()}`;
  window.history.replaceState({}, "", finalUrl);
}

function buildPuzzlePack(settings) {
  const puzzles = [];
  const usedPathFingerprints = new Set();
  const usedVisibleFingerprints = new Set();
  for (let gameIndex = 0; gameIndex < settings.games; gameIndex += 1) {
    const puzzle = buildDiversePuzzle(
      settings.bundle,
      gameIndex,
      settings,
      puzzles,
      usedPathFingerprints,
      usedVisibleFingerprints,
    );
    puzzles.push(puzzle);
    usedPathFingerprints.add(puzzle.pathFingerprint);
    usedVisibleFingerprints.add(puzzle.visibleFingerprint);
  }
  return puzzles;
}

function buildPuzzle(seed, gameIndex, settings) {
  const rng = createRng(seed);
  const path = generateHamiltonianPath(settings.width, settings.height, settings.mode, rng);
  return {
    title: t("sheetTitle"),
    instructions: settings.instructions,
    width: settings.width,
    height: settings.height,
    mode: settings.mode,
    gameIndex,
    checkpoints: selectCheckpoints(path, settings.checkpoints),
    solutionPath: path,
    seed,
    pathFingerprint: "",
    visibleFingerprint: "",
  };
}

function deriveGameSeed(bundle, gameIndex) {
  return BigInt(gameIndex) * BUNDLE_BASE + bundle;
}

function deriveCandidateSeed(bundle, gameIndex, candidateIndex) {
  return bundle + BigInt(gameIndex) * BUNDLE_BASE + BigInt(candidateIndex) * 1000003n;
}

function buildDiversePuzzle(bundle, gameIndex, settings, existingPuzzles, usedPathFingerprints, usedVisibleFingerprints) {
  const candidateCount = candidateBatchSize(settings.width, settings.height);
  let bestPuzzle = null;
  let bestScore = -Infinity;

  for (let candidateIndex = 0; candidateIndex < candidateCount; candidateIndex += 1) {
    const seed = deriveCandidateSeed(bundle, gameIndex, candidateIndex);
    const puzzle = buildPuzzle(seed, gameIndex, settings);
    puzzle.pathFingerprint = canonicalPathFingerprint(puzzle.solutionPath, puzzle.width, puzzle.height, puzzle.mode);
    puzzle.visibleFingerprint = canonicalCheckpointFingerprint(
      puzzle.checkpoints,
      puzzle.width,
      puzzle.height,
      puzzle.mode,
    );

    const exactPathDuplicate = usedPathFingerprints.has(puzzle.pathFingerprint);
    const exactVisibleDuplicate = usedVisibleFingerprints.has(puzzle.visibleFingerprint);
    const diversity = existingPuzzles.length === 0
      ? 1000
      : Math.min(...existingPuzzles.map((other) => puzzleDistance(puzzle, other)));
    const noveltyBonus = exactPathDuplicate ? -5000 : 0;
    const visibleBonus = exactVisibleDuplicate ? -2500 : 400;
    const score = modeScore(puzzle.solutionPath, puzzle.mode) + diversity * 8 + noveltyBonus + visibleBonus;

    if (score > bestScore) {
      bestPuzzle = puzzle;
      bestScore = score;
    }

    if (!exactPathDuplicate && !exactVisibleDuplicate && diversity >= 12) {
      bestPuzzle = puzzle;
      break;
    }
  }

  return bestPuzzle;
}

function candidateBatchSize(width, height) {
  const area = width * height;
  if (area <= 16) {
    return 96;
  }
  if (area <= 36) {
    return 56;
  }
  if (area <= 64) {
    return 32;
  }
  return 20;
}

function defaultBundle(date = new Date()) {
  const yy = String(date.getFullYear()).slice(-2);
  const MM = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const HH = String(date.getHours()).padStart(2, "0");
  const mm = String(date.getMinutes()).padStart(2, "0");
  const ss = String(date.getSeconds()).padStart(2, "0");
  return Number(`${yy}${MM}${dd}${HH}${mm}${ss}`);
}

function createRng(seed) {
  let state = BigInt.asUintN(64, seed);
  return {
    nextFloat() {
      state = BigInt.asUintN(64, state + GOLDEN_GAMMA);
      let z = state;
      z = BigInt.asUintN(64, (z ^ (z >> 30n)) * 0xbf58476d1ce4e5b9n);
      z = BigInt.asUintN(64, (z ^ (z >> 27n)) * 0x94d049bb133111ebn);
      z ^= z >> 31n;
      return Number(z & ((1n << 53n) - 1n)) / 2 ** 53;
    },
    nextInt(maxExclusive) {
      return Math.floor(this.nextFloat() * maxExclusive);
    },
  };
}

function generateHamiltonianPath(width, height, mode, rng) {
  const path = serpentinePath(width, height);
  let bestPath = path.slice();
  let bestScore = modeScore(bestPath, mode);
  const attempts = 12;
  const iterations = Math.max(300, width * height * 40);

  for (let attempt = 0; attempt < attempts; attempt += 1) {
    const candidate = path.slice();
    randomizePath(candidate, width, height, rng, iterations);
    const score = modeScore(candidate, mode);
    if (score > bestScore) {
      bestPath = candidate.slice();
      bestScore = score;
    }
    if (matchesMode(candidate, mode) && pathScore(candidate) >= Math.max(10, Math.floor((width * height) / 3))) {
      bestPath = candidate.slice();
      break;
    }
  }

  if (!matchesMode(bestPath, mode)) {
    bestPath = forceModeMatch(bestPath, width, height, mode, rng);
  }

  return bestPath;
}

function serpentinePath(width, height) {
  const path = [];
  for (let row = 0; row < height; row += 1) {
    if (row % 2 === 0) {
      for (let col = 0; col < width; col += 1) {
        path.push({ row, col });
      }
    } else {
      for (let col = width - 1; col >= 0; col -= 1) {
        path.push({ row, col });
      }
    }
  }
  return path;
}

function randomizePath(path, width, height, rng, iterations) {
  for (let step = 0; step < iterations; step += 1) {
    backbiteStep(path, width, height, rng);
  }
}

function backbiteStep(path, width, height, rng) {
  const fromStart = rng.nextFloat() < 0.5;
  const endpointIndex = fromStart ? 0 : path.length - 1;
  const blockedIndex = fromStart ? 1 : path.length - 2;
  const endpoint = path[endpointIndex];
  const blockedNeighbor = path[blockedIndex];
  const candidates = neighbors(endpoint, width, height)
    .filter((point) => !samePoint(point, blockedNeighbor));
  shuffle(candidates, rng);

  const positions = new Map(path.map((point, index) => [pointKey(point), index]));
  for (const candidate of candidates) {
    const cutIndex = positions.get(pointKey(candidate));
    if (fromStart) {
      if (cutIndex <= 1) {
        continue;
      }
      const prefix = path.slice(0, cutIndex).reverse();
      path.splice(0, cutIndex, ...prefix);
      return true;
    }
    if (cutIndex >= path.length - 2) {
      continue;
    }
    const suffix = path.slice(cutIndex + 1).reverse();
    path.splice(cutIndex + 1, suffix.length, ...suffix);
    return true;
  }
  return false;
}

function neighbors(point, width, height) {
  const result = [];
  if (point.row > 0) {
    result.push({ row: point.row - 1, col: point.col });
  }
  if (point.row + 1 < height) {
    result.push({ row: point.row + 1, col: point.col });
  }
  if (point.col > 0) {
    result.push({ row: point.row, col: point.col - 1 });
  }
  if (point.col + 1 < width) {
    result.push({ row: point.row, col: point.col + 1 });
  }
  return result;
}

function samePoint(first, second) {
  return first.row === second.row && first.col === second.col;
}

function pointKey(point) {
  return `${point.row}:${point.col}`;
}

function pointsAdjacent(first, second) {
  return Math.abs(first.row - second.row) + Math.abs(first.col - second.col) === 1;
}

function matchesMode(path, mode) {
  return mode === "circuit"
    ? pointsAdjacent(path[0], path[path.length - 1])
    : !pointsAdjacent(path[0], path[path.length - 1]);
}

function forceModeMatch(path, width, height, mode, rng) {
  const candidate = path.slice();
  const limit = Math.max(500, width * height * 80);
  for (let count = 0; count < limit; count += 1) {
    backbiteStep(candidate, width, height, rng);
    if (matchesMode(candidate, mode)) {
      return candidate;
    }
  }
  throw new Error(`Unable to generate a ${mode} puzzle for this board.`);
}

function pathScore(path) {
  let turns = 0;
  for (let index = 0; index < path.length - 2; index += 1) {
    const first = path[index];
    const second = path[index + 1];
    const third = path[index + 2];
    const a = [second.row - first.row, second.col - first.col];
    const b = [third.row - second.row, third.col - second.col];
    if (a[0] !== b[0] || a[1] !== b[1]) {
      turns += 1;
    }
  }
  return turns;
}

function modeScore(path, mode) {
  const score = pathScore(path);
  return mode === "circuit"
    ? score + (matchesMode(path, mode) ? 1000 : 0)
    : score + (matchesMode(path, mode) ? 1000 : -1000);
}

function puzzleDistance(first, second) {
  const checkpointCount = Math.min(first.checkpoints.length, second.checkpoints.length);
  let checkpointDistance = 0;
  for (let index = 0; index < checkpointCount; index += 1) {
    checkpointDistance += manhattan(first.checkpoints[index], second.checkpoints[index]);
  }
  const endpointDistance =
    manhattan(first.solutionPath[0], second.solutionPath[0]) +
    manhattan(first.solutionPath[first.solutionPath.length - 1], second.solutionPath[second.solutionPath.length - 1]);
  const turnDistance = Math.abs(pathScore(first.solutionPath) - pathScore(second.solutionPath));
  return checkpointDistance + endpointDistance * 2 + turnDistance;
}

function manhattan(first, second) {
  return Math.abs(first.row - second.row) + Math.abs(first.col - second.col);
}

function canonicalPathFingerprint(path, width, height, mode) {
  return canonicalFingerprint(path, width, height, mode);
}

function canonicalCheckpointFingerprint(checkpoints, width, height, mode) {
  return canonicalFingerprint(checkpoints, width, height, mode);
}

function canonicalFingerprint(points, width, height, mode) {
  const transforms = symmetryTransforms(width, height);
  const variants = [];
  for (const transformId of transforms) {
    const transformed = points.map((point) => transformPoint(point, width, height, transformId));
    variants.push(serializePoints(transformed, mode));
    variants.push(serializePoints(transformed.slice().reverse(), mode));
  }
  variants.sort();
  return variants[0];
}

function serializePoints(points, mode) {
  return `${mode}|${points.map((point) => `${point.row},${point.col}`).join(";")}`;
}

function symmetryTransforms(width, height) {
  if (width === height) {
    return [0, 1, 2, 3, 4, 5, 6, 7];
  }
  return [0, 2, 4, 5];
}

function transformPoint(point, width, height, transformId) {
  switch (transformId) {
    case 0:
      return { row: point.row, col: point.col };
    case 1:
      return { row: point.col, col: width - 1 - point.row };
    case 2:
      return { row: height - 1 - point.row, col: width - 1 - point.col };
    case 3:
      return { row: height - 1 - point.col, col: point.row };
    case 4:
      return { row: point.row, col: width - 1 - point.col };
    case 5:
      return { row: height - 1 - point.row, col: point.col };
    case 6:
      return { row: point.col, col: point.row };
    case 7:
      return { row: height - 1 - point.col, col: width - 1 - point.row };
    default:
      return { row: point.row, col: point.col };
  }
}

function selectCheckpoints(path, checkpointCount) {
  const checkpoints = [];
  const lastIndex = path.length - 1;
  for (let position = 0; position < checkpointCount; position += 1) {
    const index = Math.round((position * lastIndex) / (checkpointCount - 1));
    checkpoints.push(path[index]);
  }
  return checkpoints;
}

function instructionsForMode(mode, checkpointCount) {
  if (mode === "circuit") {
    return t("instructionsCircuit", { checkpoints: checkpointCount, checkpointTerm: checkpointTerm() });
  }
  return t("instructionsPath", { checkpoints: checkpointCount, checkpointTerm: checkpointTerm() });
}

function checkpointTerm() {
  // Optional helper only. Locales can ignore this entirely and phrase copy
  // around numbers, markers, or other child-friendly concepts instead.
  return (MESSAGES[currentLocale] && MESSAGES[currentLocale].checkpointTerm) || MESSAGES.en.checkpointTerm;
}

function renderPages(puzzles, settings) {
  const pages = [];
  for (let index = 0; index < puzzles.length; index += settings.pack) {
    const chunk = puzzles.slice(index, index + settings.pack);
    pages.push(renderSheet(chunk, settings, Math.floor(index / settings.pack), false));
  }
  for (let index = 0; index < puzzles.length; index += settings.pack) {
    const chunk = puzzles.slice(index, index + settings.pack);
    pages.push(renderSheet(chunk, settings, Math.floor(index / settings.pack), true));
  }
  return pages.join("");
}

function renderSheet(puzzles, settings, pageIndex, showSolution) {
  const [columns, rows] = pageGridDimensions(settings.pack);
  const heading = showSolution ? t("solutions") : t("sheetTitle");
  const subtitle = showSolution ? "" : `${settings.instructions} ${t("boardLabel", { width: settings.width, height: settings.height })}`;
  const cards = puzzles
    .map((puzzle) => renderPuzzleCard(puzzle, showSolution, columns, rows))
    .join("");
  const legend = showSolution
    ? ""
    : `<div class="legend"><div class="legend-card"><strong>${escapeHtml(t("howToSolve"))}</strong>${escapeHtml(t("howToSolveBody"))}</div><div class="legend-card"><strong>${escapeHtml(t("remember"))}</strong>${escapeHtml(t("rememberBody", { cells: settings.width * settings.height, checkpoints: settings.checkpoints, checkpointTerm: checkpointTerm() }))}</div></div>`;

  return `
    <section class="sheet">
      <header class="sheet-header">
        <p class="kicker">${showSolution ? escapeHtml(t("solutionSheets")) : escapeHtml(t("sheetKicker"))}</p>
        <div class="sheet-title-row">
          <h3>${escapeHtml(heading)}</h3>
          <p class="sheet-pack">${escapeHtml(t("bundlePage", { bundle: settings.bundleText, page: pageIndex + 1 }))}</p>
        </div>
      </header>
      ${subtitle ? `<p class="sheet-subtitle">${escapeHtml(subtitle)}</p>` : ""}
      <div class="sheet-grid" style="--columns:${columns};">
        ${cards}
      </div>
      <footer class="sheet-footer">
        ${legend}
      </footer>
    </section>
  `;
}

function renderPuzzleCard(puzzle, showSolution, columns, rows) {
  const cell = cellSizeMm(puzzle.width, puzzle.height, columns, rows, showSolution);
  return `
    <article class="puzzle-card">
      <h4 class="puzzle-title">${escapeHtml(t("gameTitle", { game: puzzle.gameIndex + 1 }))}</h4>
      ${renderBoard(puzzle, showSolution, cell)}
    </article>
  `;
}

function pageGridDimensions(pack) {
  if (pack <= 1) {
    return [1, 1];
  }
  if (pack === 2) {
    return [1, 2];
  }
  return [2, Math.ceil(pack / 2)];
}

function cellSizeMm(width, height, columns, rows, showSolution) {
  const pageWidth = 180;
  const pageHeight = 267;
  const gridGap = 6;
  const footer = showSolution ? 0 : 22;
  const header = 24;
  const subtitle = 12;
  const slotWidth = (pageWidth - (columns - 1) * gridGap) / columns;
  const slotHeight = (pageHeight - header - subtitle - footer - (rows - 1) * gridGap) / rows;
  const boardWidth = slotWidth;
  const boardHeight = slotHeight - 10;
  return Math.max(4.8, Math.min(27, boardWidth / width, boardHeight / height));
}

function renderBoard(puzzle, showSolution, cellSizeMmValue) {
  const checkpointMap = new Map(puzzle.checkpoints.map((point, index) => [pointKey(point), String(index + 1)]));
  const endpointSet = new Set([
    pointKey(puzzle.checkpoints[0]),
    pointKey(puzzle.checkpoints[puzzle.checkpoints.length - 1]),
  ]);
  const solutionEndpointSet = showSolution
    ? new Set([pointKey(puzzle.solutionPath[0]), pointKey(puzzle.solutionPath[puzzle.solutionPath.length - 1])])
    : new Set();
  const cells = [];
  for (let row = 0; row < puzzle.height; row += 1) {
    for (let col = 0; col < puzzle.width; col += 1) {
      const key = pointKey({ row, col });
      const label = checkpointMap.get(key);
      let labelMarkup = "";
      if (label) {
        const classes = ["label"];
        if (endpointSet.has(key)) {
          classes.push("endpoint");
          if (solutionEndpointSet.has(key)) {
            classes.push("solution-endpoint");
          }
        }
        labelMarkup = `<span class="${classes.join(" ")}">${escapeHtml(label)}</span>`;
      }
      cells.push(`<div class="cell">${labelMarkup}</div>`);
    }
  }

  const boardStyle = [
    `--cell:${cellSizeMmValue.toFixed(2)}mm`,
    `grid-template-columns:repeat(${puzzle.width}, ${cellSizeMmValue.toFixed(2)}mm)`,
    `grid-template-rows:repeat(${puzzle.height}, ${cellSizeMmValue.toFixed(2)}mm)`,
  ].join("; ");

  return `
    <div class="board" style="${boardStyle}">
      ${renderGridSvg(puzzle.width, puzzle.height)}
      ${renderPathSvg(puzzle, showSolution)}
      ${cells.join("")}
    </div>
  `;
}

function renderGridSvg(width, height) {
  const viewBoxWidth = width * 100;
  const viewBoxHeight = height * 100;
  const bleed = 8;
  const verticals = Array.from({ length: width - 1 }, (_, index) => {
    const x = (index + 1) * 100;
    return `<line x1="${x}" y1="${-bleed}" x2="${x}" y2="${viewBoxHeight + bleed}"></line>`;
  }).join("");
  const horizontals = Array.from({ length: height - 1 }, (_, index) => {
    const y = (index + 1) * 100;
    return `<line x1="${-bleed}" y1="${y}" x2="${viewBoxWidth + bleed}" y2="${y}"></line>`;
  }).join("");
  return `
    <svg class="grid-layer" viewBox="0 0 ${viewBoxWidth} ${viewBoxHeight}" aria-hidden="true">
      <g stroke="#6b6b6b" stroke-width="3.6" stroke-linecap="square" shape-rendering="crispEdges">
        ${verticals}
        ${horizontals}
      </g>
    </svg>
  `;
}

function renderPathSvg(puzzle, showSolution) {
  const viewBoxWidth = puzzle.width * 100;
  const viewBoxHeight = puzzle.height * 100;
  if (!showSolution) {
    return `<svg class="path-layer" viewBox="0 0 ${viewBoxWidth} ${viewBoxHeight}" aria-hidden="true"></svg>`;
  }

  const points = puzzle.solutionPath.map((point) => `${point.col * 100 + 50},${point.row * 100 + 50}`);
  if (puzzle.mode === "circuit") {
    points.push(`${puzzle.solutionPath[0].col * 100 + 50},${puzzle.solutionPath[0].row * 100 + 50}`);
  }
  const clipId = `clip-${puzzle.gameIndex}-${showSolution ? "solution" : "puzzle"}`;
  return `
    <svg class="path-layer" viewBox="0 0 ${viewBoxWidth} ${viewBoxHeight}" aria-hidden="true">
      <defs>
        <clipPath id="${clipId}">
          <rect x="0" y="0" width="${viewBoxWidth}" height="${viewBoxHeight}"></rect>
        </clipPath>
      </defs>
      <g clip-path="url(#${clipId})">
        <polyline
          points="${points.join(" ")}"
          fill="none"
          stroke="#111111"
          stroke-width="10"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.34"
        ></polyline>
      </g>
    </svg>
  `;
}

function renderError(message) {
  const fragment = errorTemplate.content.cloneNode(true);
  fragment.querySelector("[data-i18n='cannotGenerate']").textContent = t("cannotGenerate");
  fragment.querySelector("#error-message").textContent = message;
  pagesRoot.innerHTML = "";
  pagesRoot.append(fragment);
  statusMain.textContent = t("invalidSettings");
  statusSub.textContent = message;
}

function applyStaticTranslations() {
  document.documentElement.lang = currentLocale;
  document.documentElement.dir = currentLocale === "ar" || currentLocale === "fa" ? "rtl" : "ltr";
  document.title = t("appTitle");
  document.querySelectorAll("[data-i18n]").forEach((element) => {
    const key = element.dataset.i18n;
    if (element.tagName === "OPTION") {
      element.textContent = t(key);
      return;
    }
    element.textContent = t(key);
  });
  document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
    element.setAttribute("aria-label", t(element.dataset.i18nAriaLabel));
  });
}

function resolveLocale() {
  const params = new URLSearchParams(window.location.search);
  const requested = params.get("lang");
  const candidates = requested ? [requested] : (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language]);
  for (const rawCandidate of candidates) {
    const candidate = String(rawCandidate || "").trim();
    if (!candidate) {
      continue;
    }
    if (MESSAGES[candidate]) {
      return candidate;
    }
    const base = candidate.split("-")[0];
    if (MESSAGES[base]) {
      return base;
    }
  }
  return "en";
}

function t(key, vars = {}) {
  const template = (MESSAGES[currentLocale] && MESSAGES[currentLocale][key]) || MESSAGES.en[key] || key;
  return template.replace(/\{(\w+)\}/g, (_, name) => String(vars[name] ?? `{${name}}`));
}

function tPlural(key, count, vars = {}) {
  const variant = count === 1 ? `${key}One` : `${key}Other`;
  return t(variant, vars);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function shuffle(array, rng) {
  for (let index = array.length - 1; index > 0; index -= 1) {
    const swapIndex = rng.nextInt(index + 1);
    [array[index], array[swapIndex]] = [array[swapIndex], array[index]];
  }
}
